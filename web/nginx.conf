# Configuration nginx pour TrainShop
# Sert le frontend statique et proxy /api vers l'API Node.js

server {
  listen 80;
  server_name _;

  # Racine du contenu statique
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression pour statique
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 512;

  # Serve fichiers statiques
  location / {
    # Fallback sur index.html pour les SPA (ici on a une simple page)
    try_files $uri $uri/ =404;
    expires 1h;
  }

  # Proxy /api vers l'API Node.js (api:3000 = DNS interne du réseau Docker)
  location /api/ {
    proxy_pass http://api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Timeout pour les requêtes API
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Cache contrôle pour les fichiers statiques
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Sécurité : refuse l'accès aux fichiers cachés
  location ~ /\. {
    deny all;
  }
}
